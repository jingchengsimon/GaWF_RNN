# Conda environment for Apple Silicon (osx-arm64).
# Use: conda env create -f environment_osx_arm64.yml
# environment_full.yml was exported from Linux and is not usable on Mac.

name: aim3_rnn
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.11,<3.13
  - pip
  - numpy
  - pandas
  - matplotlib
  - scikit-learn
  - scipy
  - tqdm
  - pillow
  - pip:
      - torch>=2.0
      - torchvision
      - torchaudio
      - opencv-python
      - psutil
      - pyyaml
      - seaborn
      # Optional: Jupyter (uncomment if needed)
      # - jupyterlab
      # - notebook
      # - ipykernel
