<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FAW_RNN 实验进度</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">REMOTE EXPERIMENTS</p>
        <h1>FAW_RNN 实验进度</h1>
        <p id="connection" class="connection">正在连接进度服务…</p>
      </header>
      <section id="tasks" class="task-grid" aria-live="polite"></section>
    </main>
    <template id="task-template">
      <article class="task-card">
        <div class="task-heading">
          <h2></h2>
          <span class="count"></span>
        </div>
        <p class="task-meta"></p>
        <div class="track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
          <div class="fill"></div>
        </div>
      </article>
    </template>
    <script src="/app.js" defer></script>
  </body>
</html>
